name: flutter_ui_playground
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:    
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^9.2.1
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  dartz: ^0.10.1
  equatable: ^2.0.8
  connectivity_plus: ^7.1.0
  shared_preferences: ^2.5.5
  responsive_framework: ^1.5.1
  pretty_dio_logger: ^1.4.0
  flutter_secure_storage: ^10.0.0
  flutter_localization: ^0.4.0
  flex_color_scheme: ^8.3.1
  google_fonts: ^8.0.2
  go_router: ^17.2.0
  intl: ^0.20.2
  form_builder_validators: ^11.2.0
  package_info_plus: ^9.0.1
  permission_handler: ^12.0.1
  device_info_plus: ^12.4.0
  camera: ^0.12.0+1
  geocoding: ^4.0.0
  image_cropper: ^12.2.0
  geolocator: ^14.0.2
  webview_flutter: ^4.13.1
  dotted_border: ^3.1.0
  internet_connection_checker_plus: ^2.9.1+2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  shimmer: ^3.0.0
  loader_overlay: ^5.0.0
  cached_network_image: ^3.4.1
  firebase_core: ^4.9.0
  firebase_crashlytics: ^5.2.2
  firebase_analytics: ^12.4.1
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:        
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  build_runner: ^2.14.0
  mocktail: ^1.0.5
  bloc_test: ^10.0.0
  hive_ce_generator: ^1.11.1
  network_image_mock: ^2.1.1
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#1565C0"
  image: assets/images/PG_logo.png
  color_dark: "#0D47A1"
  image_dark: assets/images/PG_logo.png
  android_12:
    image: assets/images/PG_logo.png
    color: "#1565C0"
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/PG_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/images/PG_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

